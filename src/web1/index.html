<!DOCTYPE html>
<html>
<body>

<h1>WEB 1</h1>

<input id="msg">
<button onclick="send()">Send</button>

<div id="messages"></div>

<script>
function send() {
    let msg = document.getElementById("msg").value;

    let p = document.createElement("p");
    p.innerText = "WEB1: " + msg;

    document.getElementById("messages").appendChild(p);
}
</script>

</body>
</html>
